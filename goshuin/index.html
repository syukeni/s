<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#6b3f29">
<title>朱音オルゴール v4</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f4ead9;color:#2d211b;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif}main{max-width:760px;margin:auto;padding:14px 12px 50px}header,.card{border-radius:22px}header{padding:22px;background:linear-gradient(135deg,#472719,#7b4a30);color:#fff8ed}h1{margin:0;font-family:"Yu Mincho",serif;letter-spacing:.08em}header p{margin:9px 0 0;line-height:1.7}.card{margin-top:14px;padding:16px;background:#fffdf8;border:1px solid #d8c8b5;box-shadow:0 12px 28px #5a392015}.ok{padding:11px 13px;border-radius:13px;background:#e5f3e9;color:#17633f;font-weight:800}.grid{display:grid;gap:13px;margin-top:14px}label{font-weight:800}input,select,button{font:inherit}input[type=file],select{width:100%;margin-top:7px;padding:12px;border:1px solid #ccbba8;border-radius:14px;background:#fff}input[type=range]{width:100%;margin-top:12px;accent-color:#a62e27}.buttons{display:grid;gap:10px;margin-top:15px}button{min-height:56px;border:0;border-radius:999px;padding:13px;font-weight:900;touch-action:manipulation}.test{background:#eadbc3;color:#2d211b}.play{background:#a62e27;color:#fff}.play:disabled{opacity:.42}.status{min-height:48px;margin-top:12px;line-height:1.65;font-weight:750}.player{margin-top:12px;padding:13px;border:2px solid #d9b8a2;border-radius:16px;background:#fff5ea}.player audio{display:block;width:100%;height:50px}.player a{display:block;margin-top:10px;padding:12px;border-radius:12px;background:#f0dfc8;color:#612b22;text-align:center;font-weight:900;text-decoration:none}.viewer{position:relative;min-height:230px;display:grid;place-items:center;overflow:hidden;border:1px dashed #c9b7a4;border-radius:17px;background:#fff}.viewer canvas{display:block;width:100%;height:auto}.empty{padding:55px 20px;color:#76695e;text-align:center;line-height:1.7}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.stats div{padding:10px 5px;border-radius:12px;background:#f3e8d7;text-align:center;font-size:.82rem;color:#74675f}.stats strong{display:block;color:#2d211b;font-size:1.05rem;margin-top:3px}.note{margin-top:12px;padding:12px;border-left:4px solid #be8d3e;background:#f7eddc;line-height:1.7;font-size:.9rem}.ver{text-align:right;color:#85776c;font-size:.75rem;margin-top:8px}@media(min-width:650px){.grid{grid-template-columns:1fr 1fr}.buttons{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<main>
<header><h1>朱音オルゴール</h1><p>御朱印の墨書を旋律、朱印を低音、余白を休符に変換します。</p></header>
<section class="card">
<div class="ok" id="ready">アプリ準備OK — iPhone標準プレーヤー方式</div>
<div class="grid">
<label>御朱印の写真<input id="file" type="file" accept="image/*"></label>
<label>音階<select id="scale"><option value="in">陰旋法風（幽玄）</option><option value="yo">陽旋法風（明るい）</option><option value="ritsu">律音階風（端正）</option></select></label>
<label>読み取り数：<span id="stepsOut">24</span><input id="steps" type="range" min="8" max="40" step="8" value="24"></label>
<label>テンポ：<span id="bpmOut">66</span> BPM<input id="bpm" type="range" min="42" max="100" value="66"></label>
</div>
<div class="buttons"><button class="test" id="test" type="button">① テスト音を作る</button><button class="play" id="play" type="button" disabled>② 御朱印の曲を作る</button></div>
<div class="player"><strong>ここで再生してください</strong><audio id="audio" controls playsinline preload="metadata"></audio><a id="openAudio" href="#" hidden>音声ファイルを開く</a></div>
<div id="status" class="status">まず「テスト音を作る」を押してください。</div>
<div class="note">ボタンを押すとWAV音声を端末内で作ります。自動再生されない場合は、上のプレーヤーに出る「▶︎」か「音声ファイルを開く」を押してください。</div>
<div class="ver">v4 / WAV生成方式</div>
</section>
<section class="card"><div class="viewer"><div id="empty" class="empty">写真を選ぶと、ここに御朱印が表示されます。</div><canvas id="canvas" hidden></canvas></div><div class="stats"><div>旋律<strong id="nNotes">—</strong></div><div>連打<strong id="nRepeat">—</strong></div><div>朱印<strong id="nSeal">—</strong></div></div></section>
</main>
<script>
(function(){
'use strict';
var q=function(id){return document.getElementById(id)},file=q('file'),scale=q('scale'),steps=q('steps'),bpm=q('bpm'),play=q('play'),test=q('test'),audio=q('audio'),openAudio=q('openAudio'),status=q('status'),canvas=q('canvas'),ctx=canvas.getContext('2d',{willReadFrequently:true}),empty=q('empty');
var source=null,events=[],audioUrl='';
var scales={in:{n:[62,63,67,69,70,74,75,79,81,82,86],c:[50,57,62]},yo:{n:[62,64,67,69,71,74,76,79,81,83,86],c:[50,57,59]},ritsu:{n:[62,64,67,69,72,74,76,79,81,84,86],c:[50,57,60]}};
function setStatus(s){status.textContent=s}
function clamp(x,a,b){return Math.min(b,Math.max(a,x))}
function hz(m){return 440*Math.pow(2,(m-69)/12)}
function ascii(v,o,s){for(var i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i))}
function wav(samples,sr){var b=new ArrayBuffer(44+samples.length*2),v=new DataView(b);ascii(v,0,'RIFF');v.setUint32(4,36+samples.length*2,true);ascii(v,8,'WAVE');ascii(v,12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);ascii(v,36,'data');v.setUint32(40,samples.length*2,true);for(var i=0;i<samples.length;i++){var s=clamp(samples[i],-1,1);v.setInt16(44+i*2,s<0?s*32768:s*32767,true)}return new Blob([b],{type:'audio/wav'})}
function note(buf,sr,start,midi,vol,dur,low){var a=Math.floor(start*sr),z=Math.min(buf.length,a+Math.floor(dur*sr)),f=hz(midi);for(var i=a;i<z;i++){var t=(i-a)/sr,e=Math.min(1,t/.008)*Math.exp(-t/(low?.75:.55));buf[i]+=Math.sin(2*Math.PI*f*t)*e*vol*(low?.20:.26);buf[i]+=Math.sin(2*Math.PI*f*2.01*t)*e*vol*(low?.04:.07)}}
function normalize(buf){var p=.0001;for(var i=0;i<buf.length;i++)p=Math.max(p,Math.abs(buf[i]));var g=Math.min(1.5,.88/p);for(var j=0;j<buf.length;j++)buf[j]=Math.tanh(buf[j]*g)}
function useBlob(blob,name){if(audioUrl)URL.revokeObjectURL(audioUrl);audioUrl=URL.createObjectURL(blob);audio.pause();audio.src=audioUrl;audio.load();openAudio.href=audioUrl;openAudio.download=name;openAudio.hidden=false;audio.play().then(function(){setStatus('再生中です。')}).catch(function(){setStatus('音声を作りました。プレーヤーの「▶︎」を押してください。')})}
function makeTest(){var sr=22050,b=new Float32Array(sr*3);note(b,sr,.05,72,.9,1.4,false);note(b,sr,.48,76,.82,1.4,false);note(b,sr,.91,79,.82,1.6,false);normalize(b);useBlob(wav(b,sr),'test.wav')}
function analyze(){if(!source)return;var w=source.width,h=source.height,d=source.data,count=Number(steps.value),slice=w/count,sc=scales[scale.value].n,stride=Math.max(1,Math.floor(Math.min(w,h)/300)),out=[],nn=0,nr=0,ns=0;for(var s=0;s<count;s++){var x0=Math.floor(s*slice),x1=Math.min(w,Math.ceil((s+1)*slice)),all=0,ink=0,red=0,wy=0,weight=0;for(var y=0;y<h;y+=stride){for(var x=x0;x<x1;x+=stride){var i=(y*w+x)*4,r=d[i],g=d[i+1],b=d[i+2],br=.299*r+.587*g+.114*b,sat=Math.max(r,g,b)-Math.min(r,g,b),isRed=r>80&&r>g*1.16&&r>b*1.1&&sat>24,isInk=!isRed&&br<172&&sat<120;all++;if(isRed)red++;if(isInk){var deep=clamp((210-br)/210,.05,1);ink++;weight+=deep;wy+=y*deep}}}var id=ink/all,rd=red/all,has=id>.004&&weight>0,av=has?wy/weight:h/2,idx=clamp(Math.round((1-av/h)*(sc.length-1)),0,sc.length-1),rep=has&&id>.05,sealHit=rd>.003;out.push({m:has?sc[idx]:null,v:clamp(.35+id*4,.35,.9),rep:rep,seal:sealHit});if(has)nn++;if(rep)nr++;if(sealHit)ns++}events=out;q('nNotes').textContent=nn+'音';q('nRepeat').textContent=nr+'か所';q('nSeal').textContent=ns+'か所';play.disabled=false;setStatus('読み取り完了。「御朱印の曲を作る」を押してください。')}
function makeSong(){if(!events.length){setStatus('先に写真を選んでください。');return}setStatus('曲を生成しています…');setTimeout(function(){var sr=22050,stepSec=60/Number(bpm.value)/2,dur=events.length*stepSec+2.2,b=new Float32Array(Math.ceil(dur*sr)),ch=scales[scale.value].c;events.forEach(function(e,i){var t=i*stepSec+.05;if(e.m!==null){note(b,sr,t,e.m,e.v,1.5,false);if(e.rep)note(b,sr,t+stepSec*.35,e.m,e.v*.55,.8,false)}if(e.seal)ch.forEach(function(m){note(b,sr,t,m,.48,1.8,true)})});normalize(b);useBlob(wav(b,sr),'goshuin-musicbox.wav')},30)}
file.addEventListener('change',function(){var f=file.files&&file.files[0];if(!f)return;setStatus('写真を読み込んでいます…');var u=URL.createObjectURL(f),img=new Image();img.onload=function(){var ratio=Math.min(900/img.naturalWidth,1200/img.naturalHeight,1);canvas.width=Math.max(1,Math.round(img.naturalWidth*ratio));canvas.height=Math.max(1,Math.round(img.naturalHeight*ratio));ctx.drawImage(img,0,0,canvas.width,canvas.height);source=ctx.getImageData(0,0,canvas.width,canvas.height);canvas.hidden=false;empty.hidden=true;URL.revokeObjectURL(u);analyze()};img.onerror=function(){URL.revokeObjectURL(u);setStatus('写真を開けませんでした。別のJPEGで試してください。')};img.src=u});
steps.addEventListener('input',function(){q('stepsOut').textContent=steps.value;if(source)analyze()});bpm.addEventListener('input',function(){q('bpmOut').textContent=bpm.value});scale.addEventListener('change',function(){if(source)analyze()});test.addEventListener('click',makeTest);play.addEventListener('click',makeSong);window.addEventListener('error',function(e){setStatus('エラー：'+e.message)});
})();
</script>
</body>
</html>
